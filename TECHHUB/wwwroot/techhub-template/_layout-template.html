<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="" />
    <title>Anchor IT - Page title</title>

    <!-- Fonts + icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet" />

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- simple-datatables (only needed on pages with a data table) -->
    <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />

    <!-- Anchor IT theme — replaces startbootstrap's styles.css -->
    <link href="assets/css/theme.css" rel="stylesheet" />
</head>
<body class="app-shell">

    <!--
        THIS FILE IS A TEMPLATE, NOT A PAGE.
        Copy it for every new screen, then:
          1. Update <title> above.
          2. Replace the PAGE CONTENT block below.
          3. Set window.ANCHOR_PAGE to match a data-page value in
             partials/sidenav.html, so the correct nav item highlights.
        Do not edit the header / sidenav / footer markup here — those live
        in partials/ and are shared by every page automatically.
    -->

    <div id="appHeader"></div>
    <div id="appSidenav"></div>

    <main class="app-content">

        <h1 class="page-title">Page heading</h1>
        <p class="page-subtitle">One line describing what this page is for.</p>

        <!-- ============================ -->
        <!--   PAGE CONTENT START          -->
        <!--   Replace everything between  -->
        <!--   these two markers.          -->
        <!-- ============================ -->

        <div class="card">
            <div class="card-body">
                Page-specific markup goes here.
            </div>
        </div>

        <!-- ============================ -->
        <!--   PAGE CONTENT END            -->
        <!-- ============================ -->

    </main>

    <div id="appFooter"></div>

    <!-- Vendor scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js"></script>

    <!-- Tell layout.js which sidenav item to highlight on this page -->
    <script>window.ANCHOR_PAGE = "dashboard";</script>

    <!-- Shared layout (loads header/sidenav/footer, wires up toggle behaviour) -->
    <script src="assets/js/layout.js"></script>

    <!-- Page-specific script, if any -->

</body>
</html>
